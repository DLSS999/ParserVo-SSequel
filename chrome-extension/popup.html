<!doctype html><html><head><meta charset="utf-8"><style>
body{font:13px Arial,sans-serif;width:420px;margin:0;padding:14px;background:#f5f5f5;color:#111}h1{font-size:16px;margin:0 0 12px}.grid{display:grid;gap:8px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}label{display:grid;gap:4px;font-size:11px;text-transform:uppercase}input{padding:8px;border:1px solid #aaa;background:#fff}button{padding:10px;border:0;background:#111;color:#fff;font-weight:700;cursor:pointer}.secondary{background:#ddd;color:#111}.danger{background:#ffd8d8;color:#7a0000}.ok{background:#d8ffd0;color:#075d00}.box{background:#fff;border:1px solid #ddd;padding:10px;white-space:pre-wrap;max-height:180px;overflow:auto}.status{font-weight:700}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}</style></head>
<body><h1>ParserVo Stone Island Capture <span id="version"></span></h1><div class="grid">
<label>API Base URL<input id="apiBaseUrl"></label><label>Shop<input id="shop" placeholder="store.myshopify.com"></label><label>Browser Capture Token<input id="token" type="password"></label>
<div class="row"><label>PLN → UAH<input id="plnRate"></label><label>EUR → UAH<input id="eurRate"></label></div>
<label><span><input id="autoQueue" type="checkbox"> Автоматически проверять очередь</span></label>
<button id="save">Save settings</button><button id="test" class="secondary">Test API connection</button>
<div class="actions"><button id="start" class="ok">Start queue now</button><button id="stop" class="danger">Stop</button></div>
<button id="capture" class="secondary">Capture current Stone Island product</button>
<div class="box"><div class="status" id="status"></div><div id="stats"></div></div><button id="clear" class="secondary">Clear log</button><div class="box" id="log"></div>
</div><script src="popup.js"></script></body></html>
